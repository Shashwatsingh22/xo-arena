app = "xo-arena-nakama"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NAKAMA_NAME = "xo-arena"

[http_service]
  internal_port = 7350
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  protocol = "tcp"
  internal_port = 7350
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]
