services:
  postgres:
    image: postgres:16-alpine
    container_name: xo-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  server-build:
    image: node:20-alpine
    container_name: xo-server-build
    working_dir: /app
    volumes:
      - ./server:/app
    command: sh -c "npm install && npx tsc"

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.24.2
    container_name: xo-nakama
    depends_on:
      postgres:
        condition: service_healthy
      server-build:
        condition: service_completed_successfully
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        /nakama/nakama migrate up
        --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --name xo-arena
        --database.address postgres:localdb@postgres:5432/nakama
        --logger.level DEBUG
        --session.token_expiry_sec 7200
        --runtime.js_entrypoint "build/main.js"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./server/build:/nakama/data/modules/build
      - ./local.yml:/nakama/data/local.yml
    restart: unless-stopped

  client:
    image: node:20-alpine
    container_name: xo-client
    working_dir: /app
    depends_on:
      nakama:
        condition: service_started
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      - VITE_NAKAMA_HOST=127.0.0.1
      - VITE_NAKAMA_PORT=7350
      - VITE_NAKAMA_KEY=defaultkey
      - VITE_NAKAMA_SSL=false

volumes:
  pgdata:
  client_node_modules:
